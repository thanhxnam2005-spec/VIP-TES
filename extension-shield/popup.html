<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: white;
    }
    .id-box {
      background: #1e293b;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      font-family: monospace;
      font-size: 14px;
      margin-top: 10px;
      word-break: break-all;
      color: #38bdf8;
      cursor: pointer;
    }
    .status {
      display: flex;
      items-center: center;
      gap: 8px;
      font-size: 12px;
      margin-bottom: 15px;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
    }
    h2 { margin: 0; font-size: 16px; }
    p { font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="status">
    <div class="dot"></div>
    Shield Extension Active
  </div>
  <h2>Novel Studio Shield</h2>
  <p>Copy ID dưới đây và dán vào App để kết nối:</p>
  <div id="ext-id" class="id-box">Đang lấy ID...</div>
  
  <script>
    const id = chrome.runtime.id;
    const box = document.getElementById('ext-id');
    box.innerText = id;
    box.onclick = () => {
      navigator.clipboard.writeText(id);
      box.innerText = 'Đã Copy!';
      setTimeout(() => box.innerText = id, 1000);
    };
  </script>
</body>
</html>
