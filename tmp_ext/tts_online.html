	<script>
		(function () {
			const STORAGE_KEY = 'ttsSelection.v3';
			const NIGHT_START_HOUR = 18;
			const DAY_START_HOUR = 6;

			function resolveThemeMode() {
				try {
					const raw = window.localStorage.getItem(STORAGE_KEY);
					if (raw) {
						const parsed = JSON.parse(raw);
						if (parsed?.themePreference === 'dark' || parsed?.themePreference === 'light') {
							return parsed.themePreference;
						}
						if (parsed?.themeMode === 'dark' || parsed?.themeMode === 'light') {
							return parsed.themeMode;
						}
					}
				} catch {}

				const hour = new Date().getHours();
				return hour >= NIGHT_START_HOUR || hour < DAY_START_HOUR ? 'dark' : 'light';
			}

			const isDark = resolveThemeMode() === 'dark';
			const backgroundColor = isDark ? '#0f172a' : '#f1f5f9';
			document.documentElement.classList.toggle('dark', isDark);
			document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
			document.documentElement.style.backgroundColor = backgroundColor;
			document.addEventListener('DOMContentLoaded', function () {
				document.body.style.backgroundColor = backgroundColor;
			}, { once: true });
		})();
	</script>
