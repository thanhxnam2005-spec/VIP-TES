<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Glyph Viewer</title>
    <style>
        .glyph-box {
            display: inline-block;
            margin: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            text-align: center;
        }
        svg {
            width: 50px;
            height: 50px;
            border: 1px dotted #eee;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <script>
        fetch('glyph_hashes.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('container');
                for (const key in data) {
                    const hash = data[key].pathHash;
                    // opentype.js paths are generally designed for a 1000x1000 grid, flipped Y.
                    // We need to scale and flip it for standard SVG viewbox.
                    const box = document.createElement('div');
                    box.className = 'glyph-box';
                    box.innerHTML = `
                        <div style="font-size: 10px; margin-bottom: 5px;">${key}</div>
                        <svg viewBox="0 -1000 1000 1000" transform="scale(1, -1)">
                            <path d="${hash}" fill="black" />
                        </svg>
                    `;
                    container.appendChild(box);
                }
            });
    </script>
</body>
</html>
